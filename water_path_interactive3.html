<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standup 2.0 Water Path – Interactive</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #fff; }
  body { display: flex; flex-direction: column; align-items: center; font-family: 'Open Sans', sans-serif; }

  /* ── Progress Bar ── */
  .progress-bar {
    width: 100%;
    background: #f5f6f8;
    border: 1px solid #e2e5ea;
    border-radius: 10px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }
  .step-label {
    background: #eef2ff;
    color: #246EFF;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Open Sans', sans-serif;
    border-radius: 20px;
    padding: 4px 12px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .dots-row {
    display: flex;
    gap: 7px;
    flex: 1;
    align-items: center;
  }
  .dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #d0d5de;
    transition: background 0.3s, transform 0.2s;
    flex-shrink: 0;
  }
  .dot.active {
    background: #246EFF;
    transform: scale(1.15);
  }
  .dot.done {
    background: #246EFF;
    opacity: 0.45;
  }
  .bar-actions {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .reset-btn {
    background: #fff;
    color: #555;
    border: 1.5px solid #d0d5de;
    border-radius: 6px;
    padding: 5px 14px;
    font-size: 13px;
    font-family: 'Open Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: border-color 0.2s, color 0.2s;
  }
  .reset-btn:hover { border-color: #246EFF; color: #246EFF; }

  /* ── Canvas wrap ── */
  .wrap { position: relative; width: 100%; }
  canvas { display: block; width: 100%; height: auto; }

  /* ── Tooltip ── */
  .tooltip {
    position: absolute;
    background: #fff;
    border: 2px solid #246EFF;
    border-radius: 6px;
    padding: 4px 10px;
    font-family: 'Open Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: #246EFF;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
    box-shadow: 0 2px 12px rgba(36,110,255,0.2);
    display: none;
  }

  /* ── Completion overlay ── */
  #completion-overlay {
    display: none;
    position: absolute;
    inset: 0;
    z-index: 100;
    pointer-events: none;
  }
  #completion-overlay.visible { display: block; pointer-events: all; }
  #confetti-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  #completion-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    border: 2.5px solid #e2e5ea;
    border-radius: 16px;
    padding: 32px 36px;
    max-width: 420px;
    width: 88%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.13);
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
    z-index: 101;
  }
  @keyframes popIn {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  #completion-box .emoji { font-size: 36px; margin-bottom: 12px; }
  #completion-box p {
    font-family: 'Open Sans', sans-serif;
    font-size: 17px;
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1.55;
  }

  .instructions { color: #555; font-size: 13px; margin-bottom: 6px; }
</style>
</head>
<body>

<!-- Progress Bar -->
<div class="progress-bar" id="progress-bar">
  <span class="step-label" id="step-label">Step 1 / 9</span>
  <div class="dots-row" id="dots-row"></div>
  <div class="bar-actions">
    <button class="reset-btn" onclick="resetAll()">&#8635; Reset</button>
  </div>
</div>

<p class="instructions">Click a hotspot to reveal its water path</p>

<div class="wrap" id="wrap">
  <canvas id="cvs"></canvas>
  <div class="tooltip" id="tooltip"></div>

  <!-- Completion overlay (lives inside .wrap for absolute positioning) -->
  <div id="completion-overlay">
    <canvas id="confetti-canvas"></canvas>
    <div id="completion-box">
      <div class="emoji">🎉</div>
      <p>Great job! Now that you've mastered the Countertop 1.5 water path, scroll down to continue with the course.</p>
    </div>
  </div>
</div>

  const count = clickedHots.size;
  document.getElementById('step-label').textContent = 'Step ' + (count === 0 ? 1 : count) + ' / ' + TOTAL;
  for (let i = 0; i < TOTAL; i++) {
    const d = document.getElementById('dot-' + i);
    d.className = 'dot';
    if (i < count) d.classList.add(i === count - 1 ? 'active' : 'done');
  }
}
updateProgress();

// ── Confetti ──
let confettiParticles = [];
let confettiRunning = false;

function launchConfetti() {
  const cc = document.getElementById('confetti-canvas');
  const wrap = document.getElementById('wrap');
  cc.width  = wrap.offsetWidth;
  cc.height = wrap.offsetHeight;

  const colors = ['#246EFF','#FF6B6B','#FFD93D','#6BCB77','#A855F7','#F97316','#EC4899'];
  confettiParticles = Array.from({length: 120}, () => ({
    x: Math.random() * cc.width,
    y: -10 - Math.random() * 40,
    r: 4 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 3,
    vy: 2 + Math.random() * 3,
    rot: Math.random() * 360,
    rotV: (Math.random() - 0.5) * 8,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
    alpha: 1
  }));
  confettiRunning = true;
  animateConfetti();
}

function animateConfetti() {
  if (!confettiRunning) return;
  const cc = document.getElementById('confetti-canvas');
  const cctx = cc.getContext('2d');
  cctx.clearRect(0, 0, cc.width, cc.height);
  let alive = false;
  confettiParticles.forEach(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.rot += p.rotV;
    if (p.y > cc.height * 0.8) p.alpha -= 0.018;
    if (p.alpha > 0) { alive = true; }
    cctx.save();
    cctx.globalAlpha = Math.max(0, p.alpha);
    cctx.translate(p.x, p.y);
    cctx.rotate(p.rot * Math.PI / 180);
    cctx.fillStyle = p.color;
    if (p.shape === 'rect') {
      cctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
    } else {
      cctx.beginPath(); cctx.arc(0, 0, p.r/2, 0, Math.PI*2); cctx.fill();
    }
    cctx.restore();
  });
  if (alive) requestAnimationFrame(animateConfetti);
  else confettiRunning = false;
}

function showCompletion() {
  if (completionShown) return;
  completionShown = true;
  const overlay = document.getElementById('completion-overlay');
  overlay.classList.add('visible');
  // wait a tick for layout, then launch confetti
  setTimeout(launchConfetti, 50);
}

// ── Canvas sizing ──
function syncSize() {
  const w = canvas.offsetWidth;
  const h = Math.round(w * imgH / imgW);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width  = w;
    canvas.height = h;
  }
  // sync confetti canvas too if visible
  const cc = document.getElementById('confetti-canvas');
  if (cc.width !== w) { cc.width = w; cc.height = h; }
}

img.onload = () => { imgW = img.naturalWidth; imgH = img.naturalHeight; syncSize(); loop(); };
img.src = IMG_SRC;
window.addEventListener('resize', syncSize);

function px(pctX) { return pctX / 100 * canvas.width; }
function py(pctY) { return pctY / 100 * canvas.height; }

function loop() {
  syncSize();
  glowT += 0.04;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (img.complete && img.naturalWidth) ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  drawnLines.forEach(id => drawLine(id, 1));

  if (animQueue.length > 0) {
    const id = animQueue[0];
    if (lineProgress[id] === undefined) lineProgress[id] = 0;
    lineProgress[id] = Math.min(1, lineProgress[id] + 0.04);
    drawLine(id, lineProgress[id]);
    if (lineProgress[id] >= 1) { drawnLines.add(id); animQueue.shift(); }
  }

  HOTSPOTS.forEach(h => drawHotspot(h));
  requestAnimationFrame(loop);
}

function drawLine(id, progress) {
  const l = LINES[id];
  if (!l) return;
  const x1 = px(l.x1), y1 = py(l.y1), x2 = px(l.x2), y2 = py(l.y2);
  const ex = x1 + (x2 - x1) * progress;
  const ey = y1 + (y2 - y1) * progress;
  ctx.save();
  ctx.shadowColor = '#246EFF'; ctx.shadowBlur = 14;
  ctx.strokeStyle = '#246EFF'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(ex, ey); ctx.stroke();
  ctx.shadowBlur = 4; ctx.strokeStyle = '#80b0ff'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(ex, ey); ctx.stroke();
  ctx.restore();
}

function drawHotspot(h) {
  const cx = px(h.x), cy = py(h.y);
  const pulse = 0.55 + 0.45 * Math.sin(glowT + h.id * 0.7);
  const r = (activeHot === h.id) ? 11 : 9;
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r + 6, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(36,110,255,' + (pulse * 0.25) + ')'; ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy, r + 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(36,110,255,' + (pulse * 0.4) + ')'; ctx.fill();
  ctx.shadowColor = '#246EFF'; ctx.shadowBlur = 18 * pulse;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = '#246EFF'; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  ctx.shadowBlur = 0; ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px "Open Sans", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(h.id, cx, cy);
  ctx.restore();
}

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;
  let hit = null;
  HOTSPOTS.forEach(h => { if (Math.hypot(mx - px(h.x), my - py(h.y)) < 18) hit = h; });
  if (hit) {
    activeHot = hit.id;
    showTooltip(hit);
    hit.lines.forEach(id => { if (!drawnLines.has(id) && !animQueue.includes(id)) animQueue.push(id); });
    // track unique clicks
    if (!clickedHots.has(hit.id)) {
      clickedHots.add(hit.id);
      updateProgress();
      if (clickedHots.size === TOTAL) {
        setTimeout(showCompletion, 1500);
      }
    }
  } else {
    activeHot = null;
    hideTooltip();
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top)  * scaleY;
  canvas.style.cursor = HOTSPOTS.some(h => Math.hypot(mx - px(h.x), my - py(h.y)) < 18) ? 'pointer' : 'default';
});

function showTooltip(h) {
  tooltip.textContent = h.label;
  tooltip.style.display = 'block';
  const rect = canvas.getBoundingClientRect();
  const cssX = px(h.x) / canvas.width  * rect.width;
  const cssY = py(h.y) / canvas.height * rect.height;
  const anchor = h.labelAnchor || 'center';
  const DOT_R = 14;
  if (anchor === 'right') {
    tooltip.style.transform = 'translate(0, -50%)';
    tooltip.style.left = (cssX + DOT_R) + 'px';
    tooltip.style.top  = cssY + 'px';
  } else if (anchor === 'left') {
    tooltip.style.transform = 'translate(-100%, -50%)';
    tooltip.style.left = (cssX - DOT_R) + 'px';
    tooltip.style.top  = cssY + 'px';
  } else {
    tooltip.style.transform = 'translate(-50%, -130%)';
    tooltip.style.left = cssX + 'px';
    tooltip.style.top  = cssY + 'px';
  }
}

function hideTooltip() { tooltip.style.display = 'none'; }

function resetAll() {
  drawnLines.clear();
  animQueue = [];
  lineProgress = {};
  activeHot = null;
  clickedHots.clear();
  completionShown = false;
  hideTooltip();
  updateProgress();
  // hide completion overlay
  const overlay = document.getElementById('completion-overlay');
  overlay.classList.remove('visible');
  confettiRunning = false;
  const cc = document.getElementById('confetti-canvas');
  const cctx = cc.getContext('2d');
  cctx.clearRect(0, 0, cc.width, cc.height);
}
</script>
</body>
